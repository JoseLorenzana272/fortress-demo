# ============================================================
# FORTRESS IN A BOX - Example CI/CD Workflow
# ============================================================
# Copy this file into YOUR repository at:
#   .github/workflows/build.yml
#
# This workflow will:
#   1. Build your Docker image
#   2. Scan it with Trivy (blocks on CRITICAL/HIGH vulnerabilities)
#   3. Push it to GitHub Container Registry
#   4. Automatically update your deployment files with the new image tag
#
# SETUP REQUIRED:
#   - Update the deployment paths under "Update deployment image tags"
#     to match your actual deployment files
# ============================================================

name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------------------------------------------
      # If you have ONE image, keep this as is.
      # If you have MULTIPLE images, repeat the Build, Scan,
      # and Push steps for each one. Example:
      #
      #   IMAGE_API = ghcr.io/your-org/your-api
      #   IMAGE_WORKER = ghcr.io/your-org/your-worker
      #   IMAGE_FRONTEND = ghcr.io/your-org/your-frontend
      #
      # Add one set of Build + Scan + Push steps per image.
      # EVERY image MUST be scanned before pushing.
      # -------------------------------------------------------
      - name: Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:latest \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '1'
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push image
        run: |
          docker push ${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update deployment image tags
        run: |
          # -------------------------------------------------------
          # Add one line per deployment file in your k8s/ folder.
          # If you have multiple deployments, repeat the sed command
          # for each file. Examples:
          #
          #   sed -i "s|image: ghcr.io/${{ github.repository_owner }}/.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" k8s/api-deployment.yaml
          #   sed -i "s|image: ghcr.io/${{ github.repository_owner }}/.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" k8s/worker-deployment.yaml
          #   sed -i "s|image: ghcr.io/${{ github.repository_owner }}/.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" k8s/frontend-deployment.yaml
          # -------------------------------------------------------
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/.*|image: ${{ env.IMAGE_NAME }}:${{ github.sha }}|g" k8s/deployment.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/
          git commit -m "ci: update image tag to ${{ github.sha }}" || true
          git push

      - name: Clean up local Docker cache
        run: docker system prune -af