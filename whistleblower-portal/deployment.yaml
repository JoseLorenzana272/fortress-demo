# ============================================================
# Whistleblower Portal — Secure Deployment
# Passes all 6 Fortress Kyverno policies
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whistleblower-portal
  namespace: default
  labels:
    app: whistleblower-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whistleblower-portal
  template:
    metadata:
      labels:
        app: whistleblower-portal
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: whistleblower-portal
          image: ghcr.io/joselorenzana272/fortress-demo/whistleblower-portal:8b5857b47e01243a3ef121f9163a505c7c93267f
          ports:
            - containerPort: 8080
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: "200m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: whistleblower-portal
  namespace: default
spec:
  selector:
    app: whistleblower-portal
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
